version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: islamic_research_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: islamic_research
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
